version: '1.0'
services:
  neo4j:
    image: 10.1.1.110/qax/neo4j:5.26.2
    environment:
      - NEO4J_AUTH=neo4j/D6gkdYMp3NrDzh
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - ./neo4j_data/data:/data
      - ./config_files/neo4j/conf:/var/lib/neo4j/conf
      - ./config_files/neo4j/plugins:/var/lib/neo4j/plugins
      
  neo4j-search:
    # build: .
    image: 10.1.1.110/qax/neo4j-search-neo4j-search:latest
    ports:
      - "5000:5000"
    environment:
      # neo4j 数据库设置
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=D6gkdYMp3NrDzh
      - INDEX_NAME=mitre_acttack_index
      
      # Embedding 模型设置
      - EMBEDDING_URL=http://202.112.238.121:24520/embeddings/bgem3
      - EMBEDDING_TOP_K=5
      
      # Chat 模型设置
      - CHAT_URL=https://api.siliconflow.cn/v1
      - CHAT_MODEL_NAME=Qwen/Qwen2.5-7B-Instruct
      - CHAT_MODEL_API_KEY=sk-xixodpzlalrfxhgmhxrmyykbcedfgcbmzlwhcbggcsrxzmho
      - CHAT_TEMPERATURE=0
      - CHAT_MAX_TOKENS=30000
      - RERANK_URL=http://202.112.238.121:24520/rerank
      - UPLOAD_FILE_CHUNK_URL=http://202.112.238.121:24520/submit-parse-job-from-file
      - DOWNLOAD_FIULE_CHUNK_URL=http://202.112.238.121:24520/task-status/
      - OCR_URL=http://202.112.238.121:24520/ocr-image
      - ES_HOST=10.1.1.106
      - ES_PORT=9200
      - ES_AUTH_NAME=elastic
      - ES_AUTH_PASSWORD=huaqing
      - ES_INDEX=qax_graph_rag
      - ES_FULLTEXT_SIZE=50
      - ES_VECTOR_SIZE=10
      - ES_RETURN_SIZE=10
      - ES_FULLTEXT_INDEX_FILED=description
      - ES_VECTOR_FILED=description_embedding
      - ES_ALPHA=0.6
