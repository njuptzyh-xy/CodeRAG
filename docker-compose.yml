version: '1.0'
services:
  neo4j:
    image: 10.1.1.110/red-team-rag/neo4j:5.26.2
    restart: unless-stopped  # 添加这行
    environment:
      - NEO4J_AUTH=neo4j/D6gkdYMp3NrDzh
    ports:
      - "7687:7687"
      - "7474:7474"
    volumes:
      - ./neo4j_data/data:/data
      - ./config_files/neo4j/conf:/var/lib/neo4j/conf
      - ./config_files/neo4j/plugins:/var/lib/neo4j/plugins
      
  neo4j-search:
    # build: .
    image: red_rag:12-04
    restart: unless-stopped  # 添加这行
    ports:
      - "5010:5001"
    environment:
      # neo4j 数据库设置
      - PYTHONUNBUFFERED=1
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=D6gkdYMp3NrDzh
      - INDEX_NAME=mitre_acttack_index
      
      # Embedding 模型设置
      - EMBEDDING_URL=http://10.7.7.200:8222/embeddings/bgem3
      - EMBEDDING_TOP_K=5
      
      # Chat 模型设置
      - CHAT_URL=https://api.siliconflow.cn/v1
      - CHAT_MODEL_NAME=Qwen/Qwen2.5-7B-Instruct
      - CHAT_MODEL_API_KEY=sk-xixodpzlalrfxhgmhxrmyykbcedfgcbmzlwhcbggcsrxzmho
      - CHAT_TEMPERATURE=0
      - CHAT_MAX_TOKENS=30000
      - RERANK_URL=http://10.7.7.200:8223/rerank
      - UPLOAD_FILE_CHUNK_URL=http://10.7.7.200:8004/submit-parse-job-from-file
      - DOWNLOAD_FIULE_CHUNK_URL=http://10.7.7.200:8004/task-status/
      - OCR_URL=http://10.7.7.200/ocr-image
      - MILVUS_HOST=10.7.7.200
      - MILVUS_PORT=19530
      - MILVUS_USER=root
      - MILVUS_PASSWORD=Milvus
      - MILVUS_DB_NAME=default
      - MILVUS_COLLECTION=es_migration
      - MILVUS_CONSISTENCY_LEVEL=Bounded
      - MILVUS_SECURE=false
    depends_on:
      - neo4j